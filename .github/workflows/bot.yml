name: bot 24/7

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '1-59/5 * * * *'
    - cron: '2-59/5 * * * *'
    - cron: '3-59/5 * * * *'
    - cron: '4-59/5 * * * *'
  workflow_dispatch:

concurrency:
  group: bot-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install --omit=dev

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: node scripts/run.mjs

      - name: Save state
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase origin main
          git add data.json
          git diff --staged --quiet || git commit -m "bot state"
          git push
