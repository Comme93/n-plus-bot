name: bot 24/7

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: bot-daemon
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  daemon:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install --omit=dev

      - name: Telegram webhook → Vercel
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
            -H "Content-Type: application/json" \
            -d '{"url":"https://n-plus-bot.vercel.app/api/webhook","allowed_updates":["message","callback_query"]}'

      - name: Run avito worker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/daemon.mjs
