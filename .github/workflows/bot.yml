name: bot 24/7

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: bot-daemon
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  daemon:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install --omit=dev

      - name: Run bot daemon
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/daemon.mjs
